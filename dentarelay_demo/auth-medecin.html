<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion Medecin - DentaRelay</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <section class="auth-card">
      <h1>Connexion medecin</h1>
      <p>Acces simple de demonstration pour le dentiste distant.</p>

      <form id="loginForm" data-user-type="medecin">
        <label>
          Nom utilisateur
          <input id="username" placeholder="medecin1" required />
        </label>
        <label>
          Mot de passe
          <input id="password" type="password" placeholder="1234" required />
        </label>
        <div class="actions">
          <button type="submit">Se connecter</button>
          <a class="link" href="/auth-infirmier.html">Espace infirmier</a>
        </div>
      </form>

      <div class="demo-box">
        Demo users: <strong>medecin1</strong> / <strong>1234</strong> ou <strong>medecin2</strong> / <strong>1234</strong>
      </div>
      <div class="error" id="errorText"></div>
    </section>

    <script src="/auth.js"></script>
  </body>
</html>
